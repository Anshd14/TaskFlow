version: '3.8'
services:
  mysql:
    image: mysql:8
    platform: linux/amd64
    container_name: taskflow-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: taskflow
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    platform: linux/arm64
    container_name: taskflow-redis
    ports:
      - "6379:6379"

volumes:
  mysql-data:
